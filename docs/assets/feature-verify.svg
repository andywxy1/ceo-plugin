<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="vbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#vbg)" rx="10" />
  <!-- Implementer -->
  <rect x="30" y="70" width="120" height="50" rx="8" fill="none" stroke="#00d4ff" stroke-width="1.5" />
  <text x="90" y="92" font-family="system-ui, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle">Implementer</text>
  <text x="90" y="107" font-family="system-ui, monospace" font-size="8" fill="#4a4a6a" text-anchor="middle">Edit, Write</text>
  <!-- Arrow right -->
  <line x1="155" y1="95" x2="195" y2="95" stroke="#4a4a6a" stroke-width="1.5" />
  <polygon points="195,91 203,95 195,99" fill="#4a4a6a" />
  <text x="177" y="87" font-family="system-ui, sans-serif" font-size="8" fill="#4a4a6a" text-anchor="middle">output</text>
  <!-- Reviewer -->
  <rect x="208" y="70" width="120" height="50" rx="8" fill="none" stroke="#f0b232" stroke-width="1.5" />
  <text x="268" y="92" font-family="system-ui, sans-serif" font-size="11" fill="#f0b232" text-anchor="middle">Reviewer</text>
  <text x="268" y="107" font-family="system-ui, monospace" font-size="8" fill="#e74c3c" text-anchor="middle">Read-Only</text>
  <!-- Pass arrow -->
  <line x1="333" y1="95" x2="373" y2="95" stroke="#2ecc71" stroke-width="1.5" />
  <polygon points="373,91 381,95 373,99" fill="#2ecc71" />
  <text x="356" y="87" font-family="system-ui, sans-serif" font-size="9" fill="#2ecc71" text-anchor="middle" font-weight="600">PASS</text>
  <!-- Fail loop arrow -->
  <path d="M 268 125 L 268 160 L 90 160 L 90 125" fill="none" stroke="#e74c3c" stroke-width="1.5" stroke-dasharray="4,3" />
  <polygon points="86,125 90,117 94,125" fill="#e74c3c" />
  <text x="180" y="155" font-family="system-ui, sans-serif" font-size="9" fill="#e74c3c" text-anchor="middle" font-weight="600">FAIL (feedback)</text>
  <!-- Retry counter -->
  <rect x="155" y="165" width="90" height="22" rx="11" fill="#e74c3c" opacity="0.1" />
  <text x="200" y="180" font-family="system-ui, monospace" font-size="9" fill="#e74c3c" text-anchor="middle">max 3 retries</text>
  <!-- Title -->
  <text x="200" y="30" font-family="system-ui, sans-serif" font-size="13" fill="#c4c4e0" text-anchor="middle" font-weight="600">Verify-Fix Loop</text>
  <text x="200" y="48" font-family="system-ui, sans-serif" font-size="10" fill="#4a4a6a" text-anchor="middle">Every task verified before completion</text>
</svg>
