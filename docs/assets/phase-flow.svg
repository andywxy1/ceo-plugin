<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120">
  <defs>
    <linearGradient id="pbg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="900" height="120" fill="url(#pbg)" rx="10" />
  <!-- Phase boxes -->
  <!-- Setup -->
  <rect x="20" y="30" width="130" height="60" rx="8" fill="none" stroke="#6366f1" stroke-width="1.5" />
  <text x="85" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#6366f1" text-anchor="middle" font-weight="600">PHASE 0</text>
  <text x="85" y="72" font-family="system-ui, sans-serif" font-size="12" fill="#c4c4e0" text-anchor="middle">Settings</text>
  <!-- Arrow -->
  <line x1="155" y1="60" x2="180" y2="60" stroke="#4a4a6a" stroke-width="1.5" marker-end="url(#arrow)" />
  <!-- Discovery -->
  <rect x="185" y="30" width="130" height="60" rx="8" fill="none" stroke="#00d4ff" stroke-width="1.5" />
  <text x="250" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="600">PHASE 1</text>
  <text x="250" y="72" font-family="system-ui, sans-serif" font-size="12" fill="#c4c4e0" text-anchor="middle">Discovery</text>
  <!-- Gate -->
  <g transform="translate(325, 50)">
    <rect x="0" y="0" width="20" height="20" rx="3" fill="#f0b232" opacity="0.15" />
    <text x="10" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#f0b232" text-anchor="middle" font-weight="700">G</text>
  </g>
  <!-- Planning -->
  <rect x="355" y="30" width="130" height="60" rx="8" fill="none" stroke="#00d4ff" stroke-width="1.5" />
  <text x="420" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="600">PHASE 2</text>
  <text x="420" y="72" font-family="system-ui, sans-serif" font-size="12" fill="#c4c4e0" text-anchor="middle">Planning</text>
  <!-- Gate -->
  <g transform="translate(495, 50)">
    <rect x="0" y="0" width="20" height="20" rx="3" fill="#f0b232" opacity="0.15" />
    <text x="10" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#f0b232" text-anchor="middle" font-weight="700">G</text>
  </g>
  <!-- Pre-flight -->
  <rect x="525" y="30" width="130" height="60" rx="8" fill="none" stroke="#00d4ff" stroke-width="1.5" />
  <text x="590" y="55" font-family="system-ui, sans-serif" font-size="11" fill="#00d4ff" text-anchor="middle" font-weight="600">PHASE 3</text>
  <text x="590" y="72" font-family="system-ui, sans-serif" font-size="12" fill="#c4c4e0" text-anchor="middle">Pre-flight</text>
  <!-- Gate -->
  <g transform="translate(665, 50)">
    <rect x="0" y="0" width="20" height="20" rx="3" fill="#f0b232" opacity="0.15" />
    <text x="10" y="14" font-family="system-ui, sans-serif" font-size="10" fill="#f0b232" text-anchor="middle" font-weight="700">G</text>
  </g>
  <!-- Execution -->
  <rect x="695" y="30" width="185" height="60" rx="8" fill="none" stroke="#8B5CF6" stroke-width="1.5" />
  <text x="787" y="52" font-family="system-ui, sans-serif" font-size="11" fill="#8B5CF6" text-anchor="middle" font-weight="600">PHASE 4</text>
  <text x="787" y="72" font-family="system-ui, sans-serif" font-size="11" fill="#c4c4e0" text-anchor="middle">Teams + Verify-Fix</text>
  <!-- Labels -->
  <text x="450" y="112" font-family="system-ui, sans-serif" font-size="10" fill="#4a4a6a" text-anchor="middle" letter-spacing="2">G = HARD GATE  (user approval required)</text>
</svg>
