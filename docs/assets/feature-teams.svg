<svg xmlns="http://www.w3.org/2000/svg" width="400" height="200" viewBox="0 0 400 200">
  <defs>
    <linearGradient id="tbg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a3e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#tbg)" rx="10" />
  <!-- CEO node -->
  <circle cx="200" cy="40" r="22" fill="none" stroke="#f0b232" stroke-width="2" />
  <text x="200" y="44" font-family="system-ui, sans-serif" font-size="11" fill="#f0b232" text-anchor="middle" font-weight="700">CEO</text>
  <!-- Team box -->
  <rect x="50" y="80" width="300" height="100" rx="8" fill="none" stroke="#8B5CF6" stroke-width="1" stroke-dasharray="4,4" />
  <text x="200" y="96" font-family="system-ui, sans-serif" font-size="9" fill="#8B5CF6" text-anchor="middle" letter-spacing="2">TEAM: auth-feature</text>
  <!-- Worker nodes -->
  <circle cx="110" cy="140" r="18" fill="none" stroke="#00d4ff" stroke-width="1.5" />
  <text x="110" y="136" font-family="system-ui, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle">Frontend</text>
  <text x="110" y="147" font-family="system-ui, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle">Dev</text>
  <circle cx="200" cy="140" r="18" fill="none" stroke="#00d4ff" stroke-width="1.5" />
  <text x="200" y="136" font-family="system-ui, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle">Backend</text>
  <text x="200" y="147" font-family="system-ui, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle">Architect</text>
  <circle cx="290" cy="140" r="18" fill="none" stroke="#00d4ff" stroke-width="1.5" />
  <text x="290" y="136" font-family="system-ui, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle">Security</text>
  <text x="290" y="147" font-family="system-ui, sans-serif" font-size="8" fill="#00d4ff" text-anchor="middle">Engineer</text>
  <!-- SendMessage lines between workers -->
  <line x1="128" y1="140" x2="182" y2="140" stroke="#8B5CF6" stroke-width="1" opacity="0.6" />
  <line x1="218" y1="140" x2="272" y2="140" stroke="#8B5CF6" stroke-width="1" opacity="0.6" />
  <text x="155" y="133" font-family="system-ui, monospace" font-size="7" fill="#8B5CF6" text-anchor="middle" opacity="0.7">SendMsg</text>
  <text x="245" y="133" font-family="system-ui, monospace" font-size="7" fill="#8B5CF6" text-anchor="middle" opacity="0.7">SendMsg</text>
  <!-- CEO to team lines -->
  <line x1="200" y1="62" x2="200" y2="80" stroke="#f0b232" stroke-width="1" opacity="0.4" />
</svg>
