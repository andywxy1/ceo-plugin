<svg xmlns="http://www.w3.org/2000/svg" width="900" height="300" viewBox="0 0 900 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f23;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0b232;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
  </defs>
  <rect width="900" height="300" fill="url(#bg)" rx="12" />
  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#00d4ff">
    <line x1="0" y1="50" x2="900" y2="50" /><line x1="0" y1="100" x2="900" y2="100" />
    <line x1="0" y1="150" x2="900" y2="150" /><line x1="0" y1="200" x2="900" y2="200" />
    <line x1="0" y1="250" x2="900" y2="250" />
    <line x1="100" y1="0" x2="100" y2="300" /><line x1="200" y1="0" x2="200" y2="300" />
    <line x1="300" y1="0" x2="300" y2="300" /><line x1="400" y1="0" x2="400" y2="300" />
    <line x1="500" y1="0" x2="500" y2="300" /><line x1="600" y1="0" x2="600" y2="300" />
    <line x1="700" y1="0" x2="700" y2="300" /><line x1="800" y1="0" x2="800" y2="300" />
  </g>
  <!-- Accent line -->
  <rect x="0" y="0" width="900" height="4" fill="url(#accent)" rx="2" />
  <!-- Node constellation -->
  <g filter="url(#glow)" opacity="0.4">
    <circle cx="120" cy="80" r="4" fill="#00d4ff" />
    <circle cx="200" cy="120" r="3" fill="#8B5CF6" />
    <circle cx="160" cy="200" r="3" fill="#f0b232" />
    <line x1="120" y1="80" x2="200" y2="120" stroke="#00d4ff" stroke-width="0.5" opacity="0.5" />
    <line x1="200" y1="120" x2="160" y2="200" stroke="#8B5CF6" stroke-width="0.5" opacity="0.5" />
    <circle cx="750" cy="90" r="3" fill="#f0b232" />
    <circle cx="800" cy="150" r="4" fill="#00d4ff" />
    <circle cx="720" cy="180" r="3" fill="#8B5CF6" />
    <line x1="750" y1="90" x2="800" y2="150" stroke="#f0b232" stroke-width="0.5" opacity="0.5" />
    <line x1="800" y1="150" x2="720" y2="180" stroke="#00d4ff" stroke-width="0.5" opacity="0.5" />
  </g>
  <!-- Title -->
  <text x="450" y="110" font-family="system-ui, -apple-system, sans-serif" font-size="48" font-weight="700" fill="white" text-anchor="middle" letter-spacing="2">CEO</text>
  <text x="450" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#a0a0c0" text-anchor="middle" letter-spacing="4">CHIEF EXECUTIVE ORCHESTRATOR</text>
  <!-- Tagline -->
  <text x="450" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#00d4ff" text-anchor="middle" opacity="0.9">170+ Agents  /  Team Coordination  /  Verify-Fix Loops  /  Hard-Gated Execution</text>
  <!-- Version -->
  <rect x="395" y="220" width="110" height="28" rx="14" fill="none" stroke="url(#accent)" stroke-width="1.5" />
  <text x="450" y="239" font-family="system-ui, -apple-system, monospace" font-size="13" fill="#00d4ff" text-anchor="middle" font-weight="600">v3.1.0</text>
  <!-- Bottom accent -->
  <rect x="0" y="296" width="900" height="4" fill="url(#accent)" rx="2" />
</svg>
